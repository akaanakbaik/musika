name: Deploy to Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build music player
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          BASE_PATH: /
        run: pnpm --filter @workspace/music-player run build

      - name: Verify build output exists
        run: |
          ls -la artifacts/music-player/dist/public/
          echo "Index HTML:"
          cat artifacts/music-player/dist/public/index.html | grep -o 'src="[^"]*"' | head -5

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Create Vercel build output
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel Production
        id: deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prod --yes --prebuilt --token=${{ secrets.VERCEL_TOKEN }} 2>&1 | tail -1)
          echo "deploy_url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "Deployed to: $DEPLOY_URL"

      - name: Verify deployment is live
        run: |
          sleep 25
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" "https://musika-one.vercel.app" --max-time 30)
          BUNDLE=$(curl -s "https://musika-one.vercel.app/" | grep -o 'src="/assets/[^"]*"' | head -1)
          echo "Main site HTTP: $STATUS"
          echo "JS bundle: $BUNDLE"
          if [ "$STATUS" = "200" ]; then
            echo "✓ Deployment verified and live"
          else
            echo "WARNING: site returned $STATUS"
            exit 1
          fi
