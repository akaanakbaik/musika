name: Deploy to Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build music player
        run: pnpm --filter @workspace/music-player run build

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel Production
        id: deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prod --yes --prebuilt --token=${{ secrets.VERCEL_TOKEN }} 2>&1 | tail -1)
          echo "deploy_url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "Deployed to: $DEPLOY_URL"

      - name: Verify deployment is live
        run: |
          sleep 15
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" "https://musika-one.vercel.app" --max-time 30)
          echo "Main site: $STATUS"
          API=$(curl -o /dev/null -s -w "%{http_code}" "https://musika-one.vercel.app/api/music/recommendations" --max-time 30)
          echo "API health: $API"
          MANIFEST=$(curl -o /dev/null -s -w "%{http_code}" "https://musika-one.vercel.app/manifest.webmanifest" --max-time 15)
          echo "Manifest: $MANIFEST"
          if [ "$STATUS" = "200" ]; then echo "✓ Deployment verified and live"; else echo "WARNING: site returned $STATUS"; fi
